name: Build Tweak

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Theos
        uses: Randomblock1/theos-action@v1

      - name: Build package
        run: make package FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: List build artifacts
        run: |
          echo "=== packages ==="
          ls -la packages/ 2>/dev/null || true
          echo "=== .theos/obj ==="
          ls -la .theos/obj/ 2>/dev/null || true
          echo "=== all dylib/deb ==="
          find . -name "*.dylib" -o -name "*.deb" 2>/dev/null

      - name: Extract dylib from deb
        run: |
          mkdir -p out
          DEB=$(find packages -name "*.deb" | head -1)
          if [ -n "$DEB" ]; then
            echo "Extracting dylib from $DEB"
            cd out
            ar x "../$DEB"
            ls -la
            # 解压 data.tar
            tar xf data.tar.* 2>/dev/null || tar xf data.tar 2>/dev/null || true
            echo "=== after tar ==="
            find . -type f
            DYLIB=$(find . -name "*.dylib" | head -1)
            if [ -n "$DYLIB" ]; then
              cp "$DYLIB" fanqiehehe.dylib
              echo "Found dylib: $DYLIB"
            fi
            cd ..
          fi
          # 备用:直接从 .theos/obj 拷贝
          if [ ! -f out/fanqiehehe.dylib ]; then
            echo "Fallback: copy from .theos/obj"
            find .theos -name "*.dylib" -exec cp {} out/fanqiehehe.dylib \;
          fi
          echo "=== final out ==="
          ls -la out/

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: fanqiehehe-deb
          path: packages/*.deb
          if-no-files-found: warn

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: fanqiehehe-dylib
          path: out/fanqiehehe.dylib
          if-no-files-found: error
